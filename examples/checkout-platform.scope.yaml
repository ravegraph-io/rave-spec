# RAVE Scope File
# Spec: section 7.8 (Scope Files)
# This file declares a scope containment hierarchy as defined in section 6.6.

version: "0.1.0"
description: "Scope hierarchy for the checkout platform"
scopes:
  - type: "system"
    target: "checkout-platform"
    description: "The full checkout platform including all payment and order services"

  - type: "application"
    target: "payments-app"
    parent:
      type: "system"
      target: "checkout-platform"
    description: "Payment processing application"

  - type: "service"
    target: "payments-api"
    parent:
      type: "application"
      target: "payments-app"
    owner:
      name: "backend-team"
      team: "Backend Services"
      contact: "backend-oncall@example.com"
    dependencies:
      - type: "service"
        target: "order-service"
      - type: "pipeline"
        target: "deploy-to-prod"
    description: "REST API for payment processing"

  - type: "service"
    target: "order-service"
    parent:
      type: "system"
      target: "checkout-platform"
    description: "Order management service"

  - type: "component"
    target: "payments-api/retry-handler"
    parent:
      type: "service"
      target: "payments-api"
    description: "Retry logic for upstream payment gateway calls"

  - type: "endpoint"
    target: "POST /v2/charges"
    parent:
      type: "service"
      target: "payments-api"
    description: "Payment charge endpoint"

  - type: "pipeline"
    target: "deploy-to-prod"
    parent:
      type: "service"
      target: "payments-api"
    description: "CI/CD pipeline for deploying payments-api to production"

  - type: "release"
    target: "payments-app/v2.3.1"
    parent:
      type: "application"
      target: "payments-app"
    description: "Payments app release v2.3.1"

  - type: "environment"
    target: "production-eu-west-1"
    description: "Primary production environment in EU West"

  - type: "team"
    target: "platform-team"
    description: "Platform engineering team responsible for deployment infrastructure"
